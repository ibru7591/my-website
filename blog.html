<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Kazi Abdullah Muhammad Ibrahim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{
    --bg: #0a0e17;
    --surface: #131a2b;
    --surface-2: #1a2338;
    --line: #223049;
    --text: #e8ecf3;
    --muted: #7d8aa3;
    --cyan: #5eead4;
    --violet: #a78bfa;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  h1,h2,h3{ font-family:'Space Grotesk', sans-serif; letter-spacing:-0.02em; }
  a{ color: inherit; text-decoration:none; }

  nav{
    position: sticky; top:0;
    display:flex; justify-content:space-between; align-items:center;
    padding: 22px 6vw;
    z-index: 100;
    backdrop-filter: blur(12px);
    background: rgba(10,14,23,0.7);
    border-bottom: 1px solid var(--line);
  }
  .nav-id{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--muted); }
  .nav-id span{ color: var(--cyan); }
  .nav-links{ display:flex; gap: 28px; font-size: 14px; color: var(--muted); }
  .nav-links a:hover{ color: var(--cyan); }

  main{ max-width: 760px; margin: 0 auto; padding: 80px 6vw 100px; }

  .page-title{
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    margin-bottom: 12px;
  }
  .page-sub{ color: var(--muted); margin-bottom: 56px; }

  .post-card{
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: 12px;
    padding: 28px 30px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.2s ease;
  }
  .post-card:hover{ border-color: var(--cyan); }
  .post-date{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
    margin-bottom: 10px;
    display:block;
  }
  .post-title{ font-size: 22px; margin-bottom: 8px; }
  .post-summary{ color: var(--muted); font-size: 15px; }

  .post-body{
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
    color: var(--text);
    font-size: 15.5px;
  }
  .post-body.open{ display: block; }
  .post-body p{ margin-bottom: 14px; }
  .post-body h1, .post-body h2, .post-body h3{ margin: 20px 0 10px; }

  .state-msg{
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
  }

  footer{
    text-align: center;
    padding: 40px 6vw 50px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>

<nav>
  <a href="/"><div class="nav-id">kazi<span>@</span>ibrahim<span>:~$</span></div></a>
  <div class="nav-links">
    <a href="/#about">about</a>
    <a href="/blog.html">blog</a>
    <a href="/#contact">contact</a>
  </div>
</nav>

<main>
  <h1 class="page-title">Blog</h1>
  <p class="page-sub">Thoughts, notes, and whatever's worth writing down.</p>

  <div id="posts-container">
    <p class="state-msg mono">loading posts...</p>
  </div>
</main>

<footer>
  © 2026 Kazi Abdullah Muhammad Ibrahim. Built with intent, from Dhaka.
</footer>

<script>
  // ---- CONFIG: update these two values after you connect this site to GitHub ----
  const GITHUB_USER = "ibru7591";
  const GITHUB_REPO = "my-website";
  const POSTS_PATH = "content/posts";
  // -------------------------------------------------------------------------------

  const container = document.getElementById('posts-container');

  function parseFrontmatter(raw){
    const match = raw.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if(!match) return { data: {}, body: raw };
    const fmBlock = match[1];
    const body = match[2];
    const data = {};
    fmBlock.split('\n').forEach(line => {
      const idx = line.indexOf(':');
      if(idx === -1) return;
      const key = line.slice(0, idx).trim();
      let val = line.slice(idx + 1).trim();
      val = val.replace(/^["']|["']$/g, '');
      data[key] = val;
    });
    return { data, body };
  }

  async function loadPosts(){
    if(GITHUB_USER === "YOUR-GITHUB-USERNAME"){
      container.innerHTML = '<p class="state-msg mono">// blog.html needs GITHUB_USER and GITHUB_REPO set at the bottom of this file before posts will load.</p>';
      return;
    }
    try{
      const listUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_PATH}`;
      const res = await fetch(listUrl);
      if(!res.ok) throw new Error('Could not reach GitHub repo contents.');
      const files = await res.json();
      const mdFiles = files.filter(f => f.name.endsWith('.md'));

      if(mdFiles.length === 0){
        container.innerHTML = '<p class="state-msg mono">no posts yet.</p>';
        return;
      }

      const posts = await Promise.all(mdFiles.map(async f => {
        const raw = await (await fetch(f.download_url)).text();
        const { data, body } = parseFrontmatter(raw);
        return { ...data, body, filename: f.name };
      }));

      posts.sort((a,b) => new Date(b.date) - new Date(a.date));

      container.innerHTML = '';
      posts.forEach((post, i) => {
        const card = document.createElement('div');
        card.className = 'post-card';
        const dateStr = post.date ? new Date(post.date).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : '';
        card.innerHTML = `
          <span class="post-date mono">${dateStr}</span>
          <h2 class="post-title">${post.title || 'Untitled'}</h2>
          <p class="post-summary">${post.summary || ''}</p>
          <div class="post-body" id="body-${i}"></div>
        `;
        card.addEventListener('click', () => {
          const bodyEl = card.querySelector('.post-body');
          if(!bodyEl.classList.contains('open')){
            bodyEl.innerHTML = window.marked ? marked.parse(post.body) : post.body;
          }
          bodyEl.classList.toggle('open');
        });
        container.appendChild(card);
      });
    }catch(err){
      container.innerHTML = '<p class="state-msg mono">could not load posts. check the GitHub repo settings in blog.html.</p>';
      console.error(err);
    }
  }

  loadPosts();
</script>

</body>
</html>
